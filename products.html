<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - Raj Studio Gift</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="preloader">
        <div class="loader"></div>
    </div>

    <header>
        <nav class="navbar">
            <div class="logo">
                <span class="raj">RAJ</span> STUDIO <span class="gift">GIFT</span>
            </div>
            <ul class="nav-links">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="products.html" class="nav-link">Products</a></li>
                <li><a href="customize.html" class="nav-link">Customize</a></li>
                <li><a href="contact.html" class="nav-link">Contact</a></li>
            </ul>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </nav>
    </header>

    <section id="products" class="products">
        <div class="section-header">
            <h2>Our Product Categories</h2>
            <p>Explore our premium range of customizable gifts</p>
        </div>
        <div class="filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="tshirt">T-shirt Printing</button>
            <button class="filter-btn" data-filter="mug">Mug Printing</button>
            <button class="filter-btn" data-filter="frame">Photo Frames</button>
            <button class="filter-btn" data-filter="pen">Pen Printing</button>
        </div>
        <div class="products-grid"></div>
    </section>

    <nav class="bottom-nav">
        <a href="index.html" class="bottom-nav-item">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>
        <a href="products.html" class="bottom-nav-item active">
            <i class="fas fa-box"></i>
            <span>Products</span>
        </a>
        <a href="customize.html" class="bottom-nav-item">
            <i class="fas fa-paint-brush"></i>
            <span>Customize</span>
        </a>
        <a href="contact.html" class="bottom-nav-item">
            <i class="fas fa-envelope"></i>
            <span>Contact</span>
        </a>
    </nav>

    <footer>
        <div class="footer-content">
            <div class="footer-logo">
                <span class="raj">RAJ</span> STUDIO <span class="gift">GIFT</span>
            </div>
            <p>Premium Corporate Gift Solutions</p>
            <div class="social-icons">
                <a href="#"><i class="fab fa-facebook-f"></i></a>
                <a href="#"><i class="fab fa-twitter"></i></a>
                <a href="#"><i class="fab fa-instagram"></i></a>
                <a href="#"><i class="fab fa-linkedin-in"></i></a>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2026 Raj Studio Gift. All rights reserved.</p>
        </div>
    </footer>

    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h3>Shopping Cart</h3>
            <button class="close-cart" id="closeCart">&times;</button>
        </div>
        <div class="cart-items" id="cartItems"></div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>Total:</span>
                <span id="cartTotal">$0.00</span>
            </div>
            <button class="btn-primary" id="checkoutBtn">Checkout</button>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
